version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: learnglobal-postgres
    environment:
      POSTGRES_USER: learnglobal
      POSTGRES_PASSWORD: learnglobal_dev
      POSTGRES_DB: learnglobal
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./apps/api/src/db/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U learnglobal"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Redis for BullMQ
  redis:
    image: redis:7-alpine
    container_name: learnglobal-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # MinIO (S3-compatible storage)
  minio:
    image: minio/minio:latest
    container_name: learnglobal-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 5

  # MinIO bucket initialization
  minio-init:
    image: minio/mc:latest
    container_name: learnglobal-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin;
      mc mb local/learnglobal-assets --ignore-existing;
      mc anonymous set download local/learnglobal-assets;
      echo 'Bucket created successfully';
      exit 0;
      "

  # API Server
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: learnglobal-api
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      NODE_ENV: development
      LOG_LEVEL: debug
      API_PORT: 3000
      API_HOST: 0.0.0.0
      DATABASE_URL: postgresql://learnglobal:learnglobal_dev@postgres:5432/learnglobal
      REDIS_URL: redis://redis:6379
      STORAGE_PROVIDER: minio
      STORAGE_ENDPOINT: http://minio:9000
      STORAGE_ACCESS_KEY: minioadmin
      STORAGE_SECRET_KEY: minioadmin
      STORAGE_BUCKET: learnglobal-assets
      STORAGE_REGION: us-east-1
      OPENAI_API_KEY: ${OPENAI_API_KEY:-sk-placeholder}
      OPENAI_MODEL: gpt-4-turbo-preview
      JWT_SECRET: dev-secret-change-in-production
      CORS_ORIGINS: http://localhost:3001,http://localhost:5173
      FEATURE_NOTEBOOKLM: "false"
      FEATURE_HEYGEN: "false"
      FEATURE_LMS_PUBLISH: "true"
      FEATURE_CHAT: "true"
      FEATURE_APPROVAL_REQUIRED: "false"
    ports:
      - "3000:3000"
    volumes:
      - ./lms-output:/app/lms-output
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Admin UI (optional - basic static serve)
  admin-ui:
    build:
      context: .
      dockerfile: Dockerfile.admin
    container_name: learnglobal-admin
    depends_on:
      - api
    ports:
      - "3001:3001"
    environment:
      VITE_API_URL: http://localhost:3000/api/v1

volumes:
  postgres_data:
  redis_data:
  minio_data:

networks:
  default:
    name: learnglobal-network
